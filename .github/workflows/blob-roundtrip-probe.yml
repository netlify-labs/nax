name: Blob Roundtrip Probe

on:
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1'

jobs:
  blob-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run credentialed blob read-back probe
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -z "$NETLIFY_SITE_ID" ] || [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "::notice::Skipping blob roundtrip probe; NETLIFY_SITE_ID and NETLIFY_AUTH_TOKEN secrets are required."
            exit 0
          fi
          export PATH="$PWD/node_modules/.bin:$PATH"
          NAX_NETLIFY_BLOB_ROUNDTRIP_E2E=1 node --test tests/integration/blob-roundtrip-probe.test.js
