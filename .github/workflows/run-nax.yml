name: Run NAX

on:
  workflow_dispatch:
    inputs:
      flow:
        description: NAX flow to run
        type: choice
        required: true
        default: review
        options:
          - review
          - ideas
          - do-next
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: run-nax-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  runAIAgentWorkflow:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      pull-requests: read
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      GH_TOKEN: ${{ github.token }}
      BRANCH: ${{ github.head_ref || github.ref_name }}
      NAX_FLOW: ${{ github.event.inputs.flow || 'review' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm install -g netlify-cli
      - run: node bin/nax.js run "$NAX_FLOW" --where local-machine --repo "$GITHUB_REPOSITORY" --branch "$BRANCH" --force --timeout-minutes 60
