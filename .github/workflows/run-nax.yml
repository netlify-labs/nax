name: Run Agent Workflow

on:
  workflow_dispatch:
    inputs:
      flow:
        description: NAX flow to run
        type: choice
        required: true
        default: review - Review, cross-review, and synthesize findings
        options:
          - review - Review, cross-review, and synthesize findings
          - ideas - Generate and score product ideas
          - do-next - Recommend the next development task
          - accessibility-audit - Audit WCAG 2.1 AA accessibility issues
          - analytics-audit - Find missing product, funnel, and feature telemetry
          - documentation - Generate or improve README and architecture docs
          - e2e-tests - Add Playwright end-to-end tests for critical flows
          - error-handling - Improve error boundaries, logging, retries, failure states
          - mobile-responsiveness - Improve small-viewport layout and touch targets
          - performance-audit - Find bottlenecks and safe optimization opportunities
          - security-audit - Multi-agent security audit + ranked vulnerability report
          - seo-audit - Audit metadata, crawlability, structured data, and page speed
          - unit-tests - Add focused unit tests for untested utility/domain code
          - ux-copy-polish - Improve UX polish, loading/empty states, and copy
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: run-nax-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  runAgentWorkflow:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      pull-requests: read
      issues: write
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      GH_TOKEN: ${{ github.token }}
      BRANCH: ${{ github.head_ref || github.ref_name }}
      NAX_FLOW_INPUT: ${{ github.event.inputs.flow || 'review' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve NAX flow
        id: resolve-flow
        run: |
          flow="${NAX_FLOW_INPUT%% - *}"

          if [ -z "$flow" ]; then
            echo "::error::Missing NAX flow."
            exit 1
          fi

          matched_flow_file=""
          for extension in yml yaml json toml js cjs mjs ts mts cts; do
            if [ -f "flows/$flow/flow.$extension" ]; then
              matched_flow_file="flows/$flow/flow.$extension"
              break
            fi
          done

          if [ -z "$matched_flow_file" ]; then
            echo "::error::Unknown NAX flow: $NAX_FLOW_INPUT"
            exit 1
          fi

          echo "flow=$flow" >> "$GITHUB_OUTPUT"
          echo "NAX_FLOW=$flow" >> "$GITHUB_ENV"
          echo "Resolved NAX flow: $flow"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm install -g netlify-cli
      - run: node src/cli/nax.js run "$NAX_FLOW" --transport netlify-api --repo "$GITHUB_REPOSITORY" --branch "$BRANCH" --force --timeout-minutes 60
      - name: Inspect nax run artifacts
        if: always()
        run: |
          if [ ! -d .nax ]; then
            echo "No .nax directory found."
            exit 0
          fi

          echo "NAX workflow directories:"
          find .nax/workflows -mindepth 1 -maxdepth 1 -type d -print 2>/dev/null | sort || true

          echo ""
          echo "NAX agent runner directories:"
          find .nax/agent-runners -mindepth 1 -maxdepth 1 -type d -print 2>/dev/null | sort || true

          echo ""
          echo "NAX agent session directories:"
          find .nax/agent-sessions -mindepth 1 -maxdepth 1 -type d -print 2>/dev/null | sort || true

          echo ""
          echo "NAX artifact files:"
          find .nax -type f -print | sort || true

          latest_summary="$(find .nax -path '*/summary.md' -type f -print | sort | tail -n 1)"
          if [ -n "$latest_summary" ]; then
            echo ""
            echo "Latest artifact summary: $latest_summary"
            echo "----"
            sed -n '1,220p' "$latest_summary"
          else
            echo ""
            echo "No artifact summary.md files found."
          fi
      - name: Upload nax run artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nax-${{ steps.resolve-flow.outputs.flow }}-${{ github.run_id }}
          path: |
            .nax/workflows/**/workflow.json
            .nax/workflows/**/artifacts/**
            .nax/agent-runners/**
            .nax/agent-sessions/**
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 30
      - name: Publish nax results to GitHub
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NAX_JOB_STATUS: ${{ job.status }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: |
          set -euo pipefail

          flow="${NAX_FLOW:-${{ steps.resolve-flow.outputs.flow }}}"
          if [ -z "$flow" ]; then
            flow="unknown"
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          artifact_name="nax-${flow}-${GITHUB_RUN_ID}"
          latest_summary="$(find .nax -path '*/summary.md' -type f -print 2>/dev/null | sort | tail -n 1 || true)"

          {
            echo "NAX ${flow} completed with status: ${NAX_JOB_STATUS}"
            echo ""
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Branch: ${BRANCH}"
            echo "- Workflow run: ${run_url}"
            echo "- Artifact: ${artifact_name}"
            echo ""

            echo "## Final results"
            echo ""
            if [ -n "$latest_summary" ] && [ -f "$latest_summary" ]; then
              sed -n '1,500p' "$latest_summary"
            else
              echo "No NAX summary.md file was found. Review the workflow run logs and uploaded artifacts for diagnostics."
            fi
          } > /tmp/nax-results-body.md

          node <<'EOF'
          const fs = require('fs')
          const maxBodyLength = 60000
          const path = '/tmp/nax-results-body.md'
          let body = fs.readFileSync(path, 'utf8')

          if (body.length > maxBodyLength) {
            body = `${body.slice(0, maxBodyLength)}\n\n_Output truncated. See the workflow artifact for the complete NAX results._\n`
          }

          fs.writeFileSync(path, body)
          EOF

          if [ -n "$PULL_REQUEST_NUMBER" ]; then
            payload="$(jq -n --rawfile body /tmp/nax-results-body.md '{ body: $body }')"
            curl --fail-with-body \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${PULL_REQUEST_NUMBER}/comments" \
              -o /tmp/nax-comment-response.json \
              -d "$payload"

            comment_url="$(jq -r '.html_url // empty' /tmp/nax-comment-response.json)"
            if [ -n "$comment_url" ]; then
              echo "Created NAX results PR comment: $comment_url"
            fi
          else
            title="NAX ${flow} results: ${BRANCH} (${GITHUB_RUN_ID})"
            payload="$(jq -n --arg title "$title" --rawfile body /tmp/nax-results-body.md '{ title: $title, body: $body }')"
            curl --fail-with-body \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues" \
              -o /tmp/nax-issue-response.json \
              -d "$payload"

            issue_url="$(jq -r '.html_url // empty' /tmp/nax-issue-response.json)"
            if [ -n "$issue_url" ]; then
              echo "Created NAX results issue: $issue_url"
            fi
          fi
