id: review
title: Review
description: Review, cross-review, and synthesize findings with multiple Netlify agents.

defaults:
  transport: auto
  notify: false
  agents:
    - claude
    - gemini
    - codex

steps:
  - id: review
    title: Review
    prompt: prompts/1_review.md
    action: issue
    submit: new-run
    agents:
      - claude
      - gemini
      - codex
    waitFor: agent-results

  - id: cross-review
    title: Cross Review
    prompt: prompts/2_cross-review.md
    action: comment
    submit: follow-up
    agents:
      - claude
      - gemini
      - codex
    input:
      - step: review
        results: all
    waitFor: agent-results

  - id: synthesize
    title: Summarize Consensus
    prompt: prompts/3_summarize-consensus.md
    action: issue
    submit: new-run
    agents:
      - codex
    input:
      - step: review
        results: all
      - step: cross-review
        results: all
    waitFor: agent-results
