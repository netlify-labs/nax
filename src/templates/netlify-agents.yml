name: Netlify Agent Runners

on:
  workflow_dispatch:
    inputs:
      trigger_text:
        description: 'What should the agent build or change? (e.g. "Add a dark mode toggle")'
        required: true
        type: string
        default: '@netlify'
      actor:
        description: 'GitHub username to attribute this run to'
        required: true
        type: string
      agent:
        description: 'Agent to use'
        required: false
        type: choice
        options:
          - codex
          - claude
          - gemini
        default: 'codex'
  pull_request_target:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited]
  issues:
    types: [opened, assigned, edited]
  issue_comment:
    types: [created, edited]

concurrency:
  group: netlify-${{ github.repository }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.actor.outputs.allowed }}
    steps:
      - id: actor
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.event.sender.login || github.actor }}
        run: |
          case "$ACTOR" in
            github-actions[bot]|netlify-coding[bot]|netlify[bot])
              echo "allowed=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission" --jq '.permission' 2>/dev/null || true)"
          case "$permission" in
            admin|maintain|write) allowed=true ;;
            *) allowed=false ;;
          esac
          echo "allowed=${allowed}" >> "$GITHUB_OUTPUT"

  netlify-agent:
    needs: authorize
    if: needs.authorize.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: netlify-labs/agent-runner-action@4e06b4897d1d69c619af6a25e00ee65e8cb9c91f
        with:
          netlify-auth-token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          netlify-site-id: ${{ secrets.NETLIFY_SITE_ID }}
          timeout-minutes: '25'
          # Optional settings:
          # default-agent: 'codex'
          # manage-labels: 'false'
          # preflight-only: 'false'
          # timezone: 'America/Los_Angeles'
          # debug: 'false'
