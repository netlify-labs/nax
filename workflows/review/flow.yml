id: review
title: Review
description: Review, cross-review, and synthesize findings with multiple Netlify agents.

defaults:
  transport: auto
  notify: false
  agents:
    - claude
    - gemini
    - codex

steps:
  - id: review
    title: Review
    description: Explore, review, and improve the current setup with three independent agents.
    prompt: prompts/1_review.md
    action: issue
    submit: new-run
    agents:
      - claude
      - gemini
      - codex
    waitFor: agent-results

  - id: cross-review
    title: Cross Review
    description: Cross-check the first-round Claude/Gemini/Codex review findings against each other.
    prompt: prompts/2_cross-review.md
    action: comment
    submit: follow-up
    agents:
      - claude
      - gemini
      - codex
    input:
      - step: review
        results: all
    waitFor: agent-results

  - id: synthesize
    title: Summarize Consensus
    description: Summarize the first-round reviews and second-round cross-review outputs into one ranked consensus plan.
    prompt: prompts/3_summarize-consensus.md
    action: issue
    submit: new-run
    agents:
      - codex
    input:
      - step: review
        results: all
      - step: cross-review
        results: all
    waitFor: agent-results
